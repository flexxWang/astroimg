name: Backend CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Backend unit tests
        run: pnpm --filter @astroimg/backend test

      - name: Backend e2e smoke tests
        run: pnpm --filter @astroimg/backend test:e2e

      - name: Backend build
        run: pnpm --filter @astroimg/backend build
